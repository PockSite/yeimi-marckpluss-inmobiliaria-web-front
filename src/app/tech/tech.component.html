<!-- 7. LENGUAJES Y HERRAMIENTAS -->
<div class="tech-section" id="tecnologias">
  <div class="section-title2">Con nosotros tendrás</div>

  <div class="tech-icons" role="list">
    <div class="tech-icon" 
         *ngFor="let value of companyValues; let i = index"
         [style.animation-delay]="i * 0.12 + 's'" role="listitem">
      <i [class]="value.icon" [style.color]="value.color"></i>
      <span class="value-title">{{ value.title }}</span>
      <p class="value-text">{{ value.text }}</p>
    </div>
  </div>

</div>
